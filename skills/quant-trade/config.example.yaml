# 风控参数
risk:
  max_order_value: 10000
  max_order_shares: 500
  daily_loss_limit: 2000
  max_position_pct: 20
  max_open_positions: 10
  stop_loss_pct: -10
  take_profit_pct: 30
  trailing_stop_pct: 10
  max_hold_days: 25
  min_hold_days: 3
  use_macd_sell: false

# 选股参数
screener:
  rps_threshold: 85
  rps_periods: [20, 60, 120]
  max_buy: 3          # 每日最多买入数量
  max_own: 5          # 总持仓上限
  use_fundamentals: false

# IBKR 连接配置
ibkr:
  host: "127.0.0.1"        # 默认本地，实盘时改为 Windows IP 或 127.0.0.1（镜像网络）
  port: 7497               # 模拟盘端口7497，实盘改为 7496
  client_id: 1
  timeout: 30

# 数据源
data_source: "yfinance"   # 或 "polygon"
polygon_api_key: ""       # 用户可填写

commission: 0.001   # 0.1%